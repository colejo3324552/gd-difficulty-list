<head>
    <meta charset="UTF-8">

    <title>Demon Difficulty List (DDL)</title>
    <style>
        :root {
            --bg-color: #121214;
            --surface-color: #1a1a1e;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --border-color: #2d2d34;
            --header-bg: #1e1e24;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-color: #0f172a;
            --accent-color: #2563eb;
            --border-color: #e2e8f0;
            --header-bg: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: var(--header-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input, select, button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
        }

        input[type="text"] {
            cursor: text;
            width: 200px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: calc(100vh - 70px);
        }

        .list-section {
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card.active {
            border-color: var(--active-color, var(--accent-color));
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .thumb {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #000;
        }

        .info {
            flex-grow: 1;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .meta {
            font-size: 13px;
            opacity: 0.7;
        }

        .panel-section {
            border-left: 1px solid var(--border-color);
            background-color: var(--surface-color);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-section img {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .desc {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .history-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
        }

        [data-theme="light"] .history-box {
            background: rgba(0, 0, 0, 0.02);
        }

        .history-title {
            font-weight: bold;
            margin-bottom: 6px;
            opacity: 0.8;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .history-list {
            margin: 0;
            padding-left: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .panel-action-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            opacity: 1;
        }
        .modal-content {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            font-size: 20px; color: var(--text-color);
        }
        .log-entry {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        .log-entry:last-child {
            border: none; margin-bottom: 0; padding-bottom: 0;
        }
        .log-list li {
            margin-bottom: 6px;
            font-size: 14px;
        }
    </style>
</head>

        function toggleChangelog() {
            const modal = document.getElementById("changelog-modal");
            if (modal.classList.contains("show")) {
                modal.classList.remove("show");
                setTimeout(() => modal.style.display = "none", 300);
            } else {
                modal.style.display = "flex";
                void modal.offsetWidth; 
                modal.classList.add("show");
                renderChangelog();
            }
        }
        function renderChangelog() {
            const listContainer = document.getElementById("changelog-list");
            listContainer.innerHTML = changelogData.map(log => `
                <div class="log-entry">
                    <div class="log-date" style="font-weight: bold; color: var(--header-bg); margin-bottom: 8px;">${log.date}</div>
                    <ul class="log-list" style="margin: 0; padding-left: 20px;">
                        ${log.changes.map(c => `<li>${c}</li>`).join('')}
                    </ul>
                </div>
            `).join('');
        }
        function toggleTheme() {
            const currentTheme = document.body.getAttribute("data-theme");
            document.body.setAttribute("data-theme", currentTheme === "light" ? "dark" : "light");
        }
        function getThumb(l){ 
            return l.videoId ? `https://i.ytimg.com/vi/${l.videoId}/hqdefault.jpg` : "https://via.placeholder.com/320x180?text=No+Thumbnail"; 
        }
        function getVideo(l){ 
            return l.videoId ? `https://www.youtube.com/watch?v=${l.videoId}` : "#"; 
        }
        function render(){
            const list = document.getElementById("list");
            const panel = document.getElementById("panel");
            const q = document.getElementById("search").value.toLowerCase();
            const sortType = document.getElementById("sort").value;
            list.innerHTML = "";
            let filtered = levels.filter(l => l.n.toLowerCase().includes(q) || l.c.toLowerCase().includes(q) || l.v.toLowerCase().includes(q));
            if (sortType === "low-score") {
                filtered.sort((a, b) => a.s - b.s);
            } else if (sortType === "alphabetical") {
                filtered.sort((a, b) => a.n.localeCompare(b.n));
            } else if (sortType === "site-top1") {
                filtered.sort((a, b) => b.daysAtTop1 - a.daysAtTop1);
            } else {
                filtered.sort((a, b) => a.r - b.r);
            }
            filtered.forEach(l => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `<img class="thumb" src="${getThumb(l)}"><div class="info"><div class="name">#${l.r} ${l.n}</div><div class="meta">${l.c} • Verified by ${l.v} • Score ${l.s}</div></div>`;
                card.onclick = () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    card.style.setProperty('--active-color', l.color);
                    
                    const top1Line = l.daysAtTop1 > 0 
                        ? `<p style="font-size:14px; color:#ff4d4d; font-weight:bold; margin-top:-5px; margin-bottom:5px;">Days at Top 1: ${l.daysAtTop1} days</p>` 
                        : '';

                    const historyItems = l.history && l.history.length > 0 
                        ? l.history.map(item => `<li>${item}</li>`).join('') 
                        : '<li>No recorded adjustments</li>';

                    panel.innerHTML = `
                        <h2 style="font-size:24px; font-weight:bold; margin:0; opacity:0.6; color:${l.color};">#${l.r}</h2>
                        <h3 style="margin-top:0; margin-bottom:10px; font-size:26px;">${l.n}</h3>
                        <p style="color:#aaa; margin-top:0;">Created by ${l.c} • Verified by <strong>${l.v}</strong></p>
                        ${top1Line}
                        <div class="desc">${l.d}</div>
                        <div class="history-box">
                            <div class="history-title">Rank Placement History</div>
                            <ul class="history-list">${historyItems}</ul>
                        </div>
                        <img src="${getThumb(l)}">
                        <button class="panel-action-btn" onclick="window.open('${getVideo(l)}','_blank')">Watch Video</button>
                    `;
                };
                list.appendChild(card);
            });
        }
        render();
    </script>
