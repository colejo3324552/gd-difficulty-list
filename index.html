<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extreme Demon Index</title>

<style>
/* THEME SYSTEM VARIABLES */
:root {
    --bg-gradient: linear-gradient(-45deg, #0a0a0a, #111111, #181022, #0a0a0a);
    --header-bg: linear-gradient(90deg, #ff2d2d, #7a5cff);
    --text-main: white;
    --text-sub: #aaa;
    --input-bg: #1b1b1b;
    --input-border: rgba(255,255,255,0.1);
    --stat-bg: #151515;
    --footer-bg: rgba(0,0,0,0.2);
    --footer-border: rgba(255,255,255,0.03);
}

[data-theme="light"] {
    --bg-gradient: linear-gradient(-45deg, #f5f5f7, #e5e5ea, #e1daec, #f5f5f7);
    --header-bg: linear-gradient(90deg, #ff4d4d, #917aff);
    --text-main: #1d1d1f;
    --text-sub: #555;
    --input-bg: #ffffff;
    --input-border: rgba(0,0,0,0.15);
    --stat-bg: #ffffff;
    --footer-bg: rgba(255,255,255,0.8);
    --footer-border: rgba(0,0,0,0.05);
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: var(--text-main);
    background: var(--bg-gradient);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADER */
header {
    padding: 35px 22px;
    text-align: center;
    background: var(--header-bg);
    position: relative;
    transition: background 0.3s;
}

h1 { margin: 0; font-size: 52px; color: white; }
h2 { margin: 8px 0 0; font-weight: normal; color: #ddd; font-size: 20px; }

/* THEME TOGGLE BUTTON */
.theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    width: auto;
    margin-top: 0;
    transition: background 0.2s, border-color 0.2s;
}
.theme-toggle:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.5);
}

/* UTILITY BAR */
.utility-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    padding: 25px 18px 10px 18px;
    max-width: 1400px;
    margin: 0 auto;
    width: calc(100% - 36px);
}

.search-container {
    flex: 2;
    display: flex;
    justify-content: flex-end;
}

.search-container input {
    width: 100%;
    max-width: 500px;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 18px;
    transition: background 0.3s, border 0.3s, color 0.3s;
}

.sort-container {
    flex: 1;
    display: flex;
    justify-content: flex-start;
}

.sort-container select {
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 18px;
    cursor: pointer;
    outline: none;
    transition: background 0.3s, border 0.3s, color 0.3s;
}

.changelog-toggle {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-main);
    padding: 16px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: background 0.2s, border-color 0.2s;
}

.changelog-toggle:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.2);
}

/* STATS */
.stats {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 20px 18px;
}

.stat {
    background: var(--stat-bg);
    padding: 15px 22px;
    border-radius: 12px;
    text-align: center;
    min-width: 120px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: background 0.3s;
}

.stat span {
    display: block;
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 6px;
    transition: color 0.3s;
}

.stat strong {
    font-size: 24px;
}
    
/* LAYOUT */
.container {
    display: flex;
    gap: 24px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    flex: 1;
    width: calc(100% - 48px);
}

.list {
    width: 62%;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* CARDS */
.card {
    display: flex;
    gap: 18px;
    align-items: center;
    background: #151515 !important;
    color: white !important;
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: scale(1.015);
    background: #1d1d1d !important;
}

.thumb {
    width: 210px;
    height: 118px;
    border-radius: 12px;
    object-fit: cover;
    background: #222;
}

.info { flex: 1; }

.name {
    font-size: 24px;
    font-weight: bold;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.meta {
    font-size: 15px;
    color: #aaa !important;
    margin-top: 8px;
}

/* PANEL */
.panel {
    width: 38%;
    position: sticky;
    top: 24px;
    background: #121212 !important;
    color: white !important;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    height: fit-content;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
}

.panel h3 {
    font-size: 28px;
    margin-top: 5px;
    margin-bottom: 15px;
}

.panel img, iframe {
    width: 100%;
    border-radius: 12px;
    margin-top: 15px;
}

.desc {
    margin-top: 15px;
    color: #ccc !important;
    line-height: 1.6;
    font-size: 16px;
}

.panel-action-btn {
    margin-top: 18px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.modal.show {
    display: flex;
    opacity: 1;
}

.modal-content {
    background: var(--input-bg);
    color: var(--text-main);
    border: 1px solid var(--input-border);
    border-radius: 16px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 30px;
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 32px;
    font-weight: bold;
    color: var(--text-sub);
    cursor: pointer;
    transition: color 0.2s;
}

.log-entry {
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--footer-border);
}

.card.active {
    border-color: var(--active-color, #7a5cff) !important;
    box-shadow: 0 0 16px var(--active-glow, rgba(122, 92, 255, 0.35));
    background: #1b1b1b !important;
}

footer {
    padding: 24px;
    text-align: center;
    background: var(--footer-bg);
    border-top: 1px solid var(--footer-border);
    color: var(--text-sub);
    font-size: 14px;
    margin-top: auto;
    transition: background 0.3s, border-color 0.3s, color 0.3s;
}
</style>
</head>

<body>

<header>
    <h1>Extreme Demon Index</h1>
    <h2>The Geometry Dash Difficulty List</h2>
    <button class="theme-toggle" onclick="toggleTheme()">Switch Theme</button>
</header>

<div class="utility-bar">
    <div class="search-container">
        <input id="search" placeholder="Search levels or verifiers..." onkeyup="render()">
    </div>
    <div class="sort-container">
        <select id="sort" onchange="render()">
            <option value="default">Sort: List Order (#1 - #33)</option>
            <option value="low-score">Lowest Score</option>
            <option value="site-top1">Most Time at Top 1 (On This Site)</option>
            <option value="alphabetical">Name (A-Z)</option>
        </select>
    </div>
    <button class="changelog-toggle" onclick="toggleChangelog()">Updates</button>
</div>

<div class="stats" id="stats-container"></div>

<div class="container">
    <div class="list" id="list"></div>
    <div class="panel" id="panel">
        <h3>Select a level</h3>
        <p style="font-size: 16px; color:#aaa;">Click any level to view details.</p>
    </div>
</div>

<div id="changelog-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="toggleChangelog()">&times;</span>
        <h2 style="margin-top: 0; margin-bottom: 25px;">Site Updates & History</h2>
        <div id="changelog-list"></div>
    </div>
</div>

<footer>Operating since June 8, 2026 • Created by the community</footer>

const levels = [

    { r:3, n:"Amethyst", c:"Mist", v:"wPopoff", s:980, color:"#af40ff", videoId:"OqGuNBi3_SU", d:"A top tier challenge filled with fast transitions and precise wave timings, testing high level reflex patterns and deep mechanical knowledge.", daysAtTop1: 0 },

    { r:6, n:"ORBIT", c:"MindCap", v:"Zoink", s:966, color:"#0011ff", videoId:"5NImQ8clMOs", d:"An extreme mega-collaboration focused entirely on highly optimized orb sequences and deceptive ship alignments.", daysAtTop1: 0 },
    { r:7, n:"Tidal Wave", c:"OniLink", v:"Zoink", s:959, color:"#00f0ff", videoId:"frjtBcNI6dI", d:"A historic level with unforgettable wave sections and beach styling, maintaining its legendary reputation as a true gatekeeper.", daysAtTop1: 0 },
    { r:8, n:"Unnerfed Sakupen Circles", c:"Nick24", v:"ad3us", s:955, color:"#e60000", videoId:"DXdbTRjRylE", d:"Legendary, incredibly tight unnerfed wave hell gauntlet section.", daysAtTop1: 0 },
    { r:9, n:"Boobawamba", c:"Akunakun", v:"EastShark1", s:950, color:"#33ff33", videoId:"TAPij318cjE", d:"An erratic mix of structural layouts and heavy memory challenges that require hours of pattern recognition.", daysAtTop1: 0 },
    { r:10, n:"Anathema", c:"nikrodox", v:"Whizkid05", s:946, color:"#7a5cff", videoId:"Vew9SOXzLME", d:"Dark aesthetics meet unforgiving tight spaces, calling for impeccable input timings and absolute focus.", daysAtTop1: 0 },
    { r:11, n:"Quanteuse Processing", c:"xander", v:"PersonHuman42", s:943, color:"#ff69b4", videoId:"sRUO72zI2GQ", d:"A beautifully dangerous gauntlet emphasizing perfect timing execution across structural obstacles.", daysAtTop1: 0 },
    { r:12, n:"Subsuming Vortex", c:"[TCD] Cursed", v:"Cursed", s:940, color:"#115c2e", videoId:"CLzkb9YMMEg", d:"A fast-paced solo project with deep thematic elements, testing specialized high speed mechanics.", daysAtTop1: 0 },
    { r:13, n:"Spectre", c:"xander", v:"PersonHuman42", s:939, color:"#89cff0", videoId:"T7FfTiH1G8k", d:"Technical gameplay with awkward rhythms, keeping players on edge with non-standard layout metrics.", daysAtTop1: 0 },
    { r:14, n:"Penumbral", c:"Cherry Team", v:"w3rty", s:937, color:"#000000", videoId:"wcnA-6zp_94", d:"A sleek project blending shadow design with cutting edge modern triggers to confuse and test advanced competitors.", daysAtTop1: 0 },
    { r:15, n:"Ashley Wave Trials", c:"OddMod", v:"Zoink", s:936, color:"#ff59b3", videoId:"aTxt76U3e2Q", d:"A vibrant pink-and-red challenge that presents dense wave tunnels and high frequency navigation challenges.", daysAtTop1: 0 },
    { r:16, n:"andromeda", c:"Insxne97", v:"taiago", s:935, color:"#3b3bff", videoId:"fFtQxxepyDo", d:"High pressure inputs meet cosmic themes, challenging extreme demon slayers to maintain nerves through multi-stage speed alterations.", daysAtTop1: 0 },
    { r:17, n:"Menace", c:"Arraegen", v:"Trick", s:934, color:"#ff9100", videoId:"yvfq83hhwgI", d:"A relentless dark test built to drain the stamina of the community's top players through narrow passageways.", daysAtTop1: 0 },
    { r:18, n:"Silent Clubstep", c:"TheRealSailent", v:"paqoe", s:934, color:"#617385", videoId:"GR4OMkS3SN8", d:"The legendary historic level officially made possible, keeping its old school structure intact for modern testing.", daysAtTop1: 0 },
    { r:19, n:"Kyouki", c:"Demishio", v:"Demishio", s:932, color:"#8000ff", videoId:"O_abYBtVgGU", d:"An incredibly fast solo journey emphasizing immediate reaction times and masterful control over complex inputs.", daysAtTop1: 0 },
    { r:20, n:"Slaughterhouse", c:"Icedcave", v:"Doggie", s:932, color:"#800000", videoId:"mVg8LgrWaYQ", d:"An atmospheric titan that relies on hyper tight gaps and intense acoustic rhythms to build pressure.", daysAtTop1: 0 },
    { r:21, n:"KOCMOC", c:"Cherry Team", v:"Zoink", s:931, color:"#5c85ff", videoId:"2CxE-UWCIG4", d:"A stunning cosmic redrawing of slaughterhouse gameplay style, elevating the intensity with beautiful celestial visuals.", daysAtTop1: 0 },
    { r:22, n:"Avernus", c:"PockeWindfish", v:"Zoink", s:930, color:"#ff4500", videoId:"16Zh8jssanc", d:"Hell themed trials heavily incorporating precise hitbox interactions that force absolute precision from the modern meta.", daysAtTop1: 0 },
    { r:23, n:"Nullscapes", c:"Exen", v:"Zoink", s:929, color:"#ffffff", videoId:"C-KDhWkXlvI", d:"A minimalist monochrome journey through structural voids, isolating the player to emphasize structural difficulty.", daysAtTop1: 0 },
    { r:24, n:"Every End", c:"MindCap", v:"Hqmy", s:927, color:"#0000ff", videoId:"f-O_TnxIZBA", d:"An exhausting endurance challenge tracking long play sequences, demanding consistent focus over extended track times.", daysAtTop1: 0 },
    { r:25, n:"Abyss of Darkness", c:"Kiba", v:"Cursed", s:925, color:"#5c0606", videoId:"zjJCqqV2410", d:"A legendary wall type challenge emphasizing sharp spikes and high danger margins at every intersection.", daysAtTop1: 0 },
    { r:26, n:"Defeated Circles", c:"GXQ", v:"Zoink", s:923, color:"#d19eff", videoId:"W9BAW2l1e9o", d:"An advanced iteration of the Nine Circles design formula, combining tricky flashing wave segments with modern timings.", daysAtTop1: 0 },
    { r:27, n:"CHIL", c:"McCoco", v:"McCoco", s:921, color:"#ffb6c1", videoId:"DROMiCc2ZRM", d:"A full length 2.2 solo production showcasing creative mechanics enabled by the update's newest technical parameters.", daysAtTop1: 0 },
    { r:28, n:"Zorin", c:"SnowEye", v:"구아이", s:920, color:"#4a5568", videoId:"ci4lNcsSaVk", d:"Technical 2.2 layout mapping that utilizes sudden camera shifts and alternative mechanics to test adaptability.", daysAtTop1: 0 },
    { r:29, n:"Acheron", c:"ryamu", v:"Zoink", s:919, color:"#ff0000", videoId:"oh0FyZHZST8", d:"The former absolute king of difficulty, demanding absolute perfection through tight spaces and intense portal shifts.", daysAtTop1: 0 },
    { r:30, n:"Tunnel of Despair", c:"Exen", v:"Zoink", s:918, color:"#525252", videoId:"0GC5og7gVS0", d:"A claustrophobic experience inside dark pathways that tests short duration muscle memory and quick ship handling.", daysAtTop1: 0 },
    { r:31, n:"Subterminal Point", c:"SyQual", v:"PoCle", s:916, color:"#7fffd4", videoId:"Syh4W449IS4", d:"A highly technical presentation featuring non-standard synchronization and irregular click groupings to trick veterans.", daysAtTop1: 0 },
    { r:32, n:"The Lightning Rod", c:"lavatrex", v:"lavatrex", s:915, color:"#008080", videoId:"DCbXHYwW7r0", d:"An electric high speed experience that channels fast paced ship tracking alongside challenging multi-mode inputs.", daysAtTop1: 0 },
    { r:33, n:"Based After Based", c:"Akunakun", v:"DiamondSplash", s:912, color:"#ddff00", videoId:"_T1xofG2zqo", d:"An ironic title masking a deeply punishing set of mechanics, requiring flawless consistency to secure a clear.", daysAtTop1: 0 }
];

function updateGlobalStats() {
    const container = document.getElementById("stats-container");
    const totalLevels = levels.length;
    
    // Sort levels to find out who has held Top 1 the longest
    const sortedByTop1 = [...levels].sort((a, b) => b.daysAtTop1 - a.daysAtTop1);
    const primaryHolder = sortedByTop1[0];
    const secondaryHolder = sortedByTop1[1];

    container.innerHTML = `
        <div class="stat">
            <span>Total Listed Demons</span>
            <strong>${totalLevels}</strong>
        </div>
        <div class="stat">
            <span>Record: Most Days at Top 1</span>
            <strong>#2 ${primaryHolder.n} (${primaryHolder.daysAtTop1}d)</strong>
        </div>
        <div class="stat">
            <span>Record: 2nd Most Days at Top 1</span>
            <strong>#1 ${secondaryHolder.n} (${secondaryHolder.daysAtTop1}d)</strong>
        </div>
    `;
}

function toggleChangelog() {
    const modal = document.getElementById("changelog-modal");
    if (modal.classList.contains("show")) {
        modal.classList.remove("show");
        setTimeout(() => modal.style.display = "none", 300);
    } else {
        modal.style.display = "flex";
        void modal.offsetWidth; 
        modal.classList.add("show");
        renderChangelog();
    }
}

function renderChangelog() {
    const listContainer = document.getElementById("changelog-list");
    listContainer.innerHTML = changelogData.map(log => `
        <div class="log-entry">
            <div class="log-date">${log.date}</div>
            <ul class="log-list">
                ${log.changes.map(c => `<li>${c}</li>`).join('')}
            </ul>
        </div>
    `).join('');
}

function toggleTheme() {
    const currentTheme = document.body.getAttribute("data-theme");
    document.body.setAttribute("data-theme", currentTheme === "light" ? "dark" : "light");
}

function getThumb(l){ return l.videoId ? `https://i.ytimg.com/vi/${l.videoId}/hqdefault.jpg` : "https://via.placeholder.com/320x180?text=No+Thumbnail"; }
function getVideo(l){ return l.videoId ? `https://www.youtube.com/watch?v=${l.videoId}` : "#"; }

function render(){
    const list = document.getElementById("list");
    const panel = document.getElementById("panel");
    const q = document.getElementById("search").value.toLowerCase();
    const sortType = document.getElementById("sort").value;
    
    list.innerHTML = "";
    let filtered = levels.filter(l => l.n.toLowerCase().includes(q) || l.c.toLowerCase().includes(q) || l.v.toLowerCase().includes(q));
    
    if (sortType === "low-score") filtered.sort((a, b) => a.s - b.s);
    else if (sortType === "alphabetical") filtered.sort((a, b) => a.n.localeCompare(b.n));
    else if (sortType === "site-top1") filtered.sort((a, b) => b.daysAtTop1 - a.daysAtTop1);
    else filtered.sort((a, b) => a.r - b.r);

    filtered.forEach(l => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<img class="thumb" src="${getThumb(l)}"><div class="info"><div class="name">#${l.r} ${l.n}</div><div class="meta">${l.c} • Verified by ${l.v} • Score ${l.s}</div></div>`;
        card.onclick = () => {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            card.style.setProperty('--active-color', l.color);
            panel.innerHTML = `<h3>#${l.r} ${l.n}</h3><p style="color:#aaa;">Created by ${l.c} • Verified by <strong>${l.v}</strong></p><p style="font-size:14px; color:#ff4d4d; font-weight:bold; margin-top:-5px;">Days at Top 1: ${l.daysAtTop1} days</p><div class="desc">${l.d}</div><img src="${getThumb(l)}"><button class="panel-action-btn" onclick="window.open('${getVideo(l)}','_blank')">Watch Verification Video</button>`;
        };
        list.appendChild(card);
    });
    
    updateGlobalStats();
}
render();
</script>
</body>
</html>
