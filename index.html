<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extreme Demon Index</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: linear-gradient(-45deg, #0a0a0a, #111111, #181022, #0a0a0a);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADER */
header {
    padding: 35px 22px;
    text-align: center;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}

h1 { margin: 0; font-size: 52px; }
h2 { margin: 8px 0 0; font-weight: normal; color: #ddd; font-size: 20px; }

/* UTILITY BAR (Larger inputs) */
.utility-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 25px 18px 10px 18px;
    max-width: 1400px;
    margin: 0 auto;
    width: calc(100% - 36px);
}

.search-container {
    flex: 2;
    display: flex;
    justify-content: flex-end;
}

.search-container input {
    width: 100%;
    max-width: 500px;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: #1b1b1b;
    color: white;
    font-size: 18px;
}

.sort-container {
    flex: 1;
    display: flex;
    justify-content: flex-start;
}

.sort-container select {
    padding: 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #1b1b1b;
    color: white;
    font-size: 18px;
    cursor: pointer;
    outline: none;
}

/* STATS */
.stats {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 20px 18px;
}

.stat {
    background: #151515;
    padding: 15px 22px;
    border-radius: 12px;
    text-align: center;
    min-width: 120px;
}

.stat span {
    display: block;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 6px;
}

.stat strong {
    font-size: 24px;
}
    
/* LAYOUT */
.container {
    display: flex;
    gap: 24px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    flex: 1;
    width: calc(100% - 48px);
}

/* LIST (Expanded for longer screen coverage) */
.list {
    width: 62%;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* CARD (Bigger elements and larger thumbnail sizing) */
.card {
    display: flex;
    gap: 18px;
    align-items: center;
    background: #151515;
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: scale(1.015);
    background: #1d1d1d;
    border-color: rgba(255,77,77,0.4);
}

.thumb {
    width: 210px;
    height: 118px;
    border-radius: 12px;
    object-fit: cover;
    background: #222;
}

.info { flex: 1; }

.name {
    font-size: 24px;
    font-weight: bold;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.meta {
    font-size: 15px;
    color: #aaa;
    margin-top: 8px;
}

/* PANEL (Wider detail component) */
.panel {
    width: 38%;
    position: sticky;
    top: 24px;
    background: #121212;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    height: fit-content;
}

.panel h3 {
    font-size: 28px;
    margin-top: 5px;
    margin-bottom: 15px;
}

.panel img, iframe {
    width: 100%;
    border-radius: 12px;
    margin-top: 15px;
}

.desc {
    margin-top: 15px;
    color: #ccc;
    line-height: 1.6;
    font-size: 16px;
}

button {
    margin-top: 18px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 16px;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}

/* FOOTER UI */
footer {
    text-align: center;
    padding: 25px;
    font-size: 15px;
    color: #777;
    border-top: 1px solid rgba(255,255,255,0.03);
    background: rgba(0,0,0,0.2);
    margin-top: auto;
}

@keyframes popIn {
    from {
        transform: translateY(8px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.card {
    animation: popIn 0.25s ease;
}

.card.active {
    border-color: rgba(122, 92, 255, 0.8);
    box-shadow: 0 0 14px rgba(122, 92, 255, 0.35);
    background: #1b1b1b;
}
</style>
</head>

<body>

<header>
    <h1>Extreme Demon Index</h1>
    <h2>The Geometry Dash Difficulty List</h2>
</header>

<div class="utility-bar">
    <div class="search-container">
        <input id="search" placeholder="Search levels..." onkeyup="render()">
    </div>
    <div class="sort-container">
        <select id="sort" onchange="render()">
            <option value="default">Sort: List Order (#1 - #25)</option>
            <option value="low-score">Lowest Score</option>
            <option value="site-top1">Most Time at Top 1 (On This Site)</option>
            <option value="alphabetical">Name (A-Z)</option>
        </select>
    </div>
</div>

<div class="stats" id="stats-container">
    <div class="stat">
        <span>Levels</span>
        <strong>25</strong>
    </div>
    <div class="stat">
        <span>Highest</span>
        <strong>983</strong>
    </div>
    <div class="stat">
        <span>Lowest</span>
        <strong>916</strong>
    </div>
    <div class="stat">
        <span>Average</span>
        <strong>939</strong>
    </div>
</div>

<div class="container">
    <div class="list" id="list"></div>

    <div class="panel" id="panel">
        <h3>Select a level</h3>
        <p style="font-size: 16px; color:#aaa;">Click any level to view details.</p>
    </div>
</div>

<footer>
    Operating since June 8, 2026
</footer>

<script>
/* ========================================================
   SITE CONFIG & TRACKING HISTORY
   ======================================================== */
const siteReleaseDate = new Date("2026-06-08"); 

const levels = [
    { r:1, n:"Flamewall", c:"Narwall", s:983, videoId:"gwNYGFmo_WY", d:"Long endurance extreme with nonstop transitions and tight control.", daysAtTop1: 1 },
    { r:2, n:"Amethyst", c:"iMist", s:980, videoId:"OqGuNBi3_SU", d:"Precision-heavy gameplay with strict timing windows.", daysAtTop1: 0 },
    { r:3, n:"ORBIT", c:"MindCap", s:967, videoId:"9oHv_cK84WI", d:"Orb chains where one mistake collapses the run instantly.", daysAtTop1: 0 },
    { r:4, n:"Thinking Space II", c:"CairoX", s:962, videoId:"F05aMR0F6YM", d:"Fast transitions between gameplay modes.", daysAtTop1: 0 },
    { r:5, n:"Tidal Wave", c:"OniLink", s:959, videoId:"frjtBcNI6dI", d:"Extreme wave control over long punishing sections.", daysAtTop1: 0 },
    { r:6, n:"Boobawamba", c:"Akunakun", s:950, videoId:"TAPij318cjE", d:"A memory-focused extreme where learning routes and hidden interactions is just as important as execution.", daysAtTop1: 0 },
    { r:7, n:"Anathema", c:"nikroplays", s:946, videoId:"4iOtRLKKbvU", d:"A difficult extreme built around relentless transitions, difficult timings, and constant gameplay changes.", daysAtTop1: 0 },
    { r:8, n:"Spectre", c:"xander", s:940, videoId:"T7FfTiH1G8k", d:"Precision-heavy gameplay with demanding control and difficult late-attempt consistency.", daysAtTop1: 0 },
    { r:9, n:"Quanteuse Processing", c:"Renn241", s:940, videoId:"sRUO72zI2GQ", d:"Technical gameplay with awkward timings, unconventional patterns, and difficult transitions.", daysAtTop1: 0 },
    { r:10, n:"Subsuming Vortex", c:"[TCD] Cursed", s:939, videoId:"3dKj12cQSII", d:"Fast-paced precision gameplay centered around difficult wave control and consistency.", daysAtTop1: 0 },
    { r:11, n:"Penumbral", c:"cherryteam", s:937, videoId:"wcnA-6zp_94", d:"A modern extreme focused on raw skill, difficult cube and wave sections, and a huge amount of precise timings.", daysAtTop1: 0 },
    { r:12, n:"Ashley Wave Trials", c:"oddmod", s:936, videoId:"aTxt76U3e2Q", d:"A wave-focused extreme that demands consistency and control through long, difficult sections.", daysAtTop1: 0 },
    { r:13, n:"andromeda", c:"Insxne97", s:935, videoId:"fFtQxxepyDo", d:"Fast-paced gameplay with difficult transitions and constant pressure throughout the level.", daysAtTop1: 0 },
    { r:14, n:"Menace", c:"Arraegen", s:934, videoId:"yvfq83hhwgI", d:"A demanding extreme with difficult timings, fast gameplay, and punishing late sections.", daysAtTop1: 0 },
    { r:15, n:"Silent Clubstep", c:"TheRealSailent", s:934, videoId:"GR4OMkS3SN8", d:"The legendary impossible-level remake, now beaten, known for its brutally precise gameplay.", daysAtTop1: 0 },
    { r:16, n:"Kyouki", c:"｛出見塩｝", s:932, videoId:"O_abYBtVgGU", d:"A high-speed extreme that demands exceptional consistency, especially through its difficult wave and ship sections.", daysAtTop1: 0 },
    { r:17, n:"Avernus", c:"PockeWindfish", s:932, videoId:"16Zh8jssanc", d:"Known for its infamous fixed-hitbox gameplay and brutally precise wave sections.", daysAtTop1: 0 },
    { r:18, n:"Nullscapes", c:"Exen", s:931, videoId:"C-KDhWkXlvI", d:"A dark-themed extreme featuring tight timings, difficult transitions, and relentless pressure.", daysAtTop1: 0 },
    { r:19, n:"Every End", c:"MindCap", s:929, videoId:"f-O_TnxIZBA", d:"A long endurance test requiring consistency across a wide variety of difficult gameplay styles.", daysAtTop1: 0 },
    { r:20, n:"Abyss of Darkness", c:"Kiba", s:927, videoId:"zjJCqqV2410", d:"One of Geometry Dash's most notorious extremes, packed with difficult timings and unforgiving precision.", daysAtTop1: 0 },
    { r:21, n:"Defeated Circles", c:"GXQ", s:925, videoId:"R8BMscOkTrA", d:"A modern Circles level built around difficult wave gameplay, tight corridors, and high precision.", daysAtTop1: 0 },
    { r:22, n:"Tunnel of Despair", c:"Exen", s:922, videoId:"0GC5og7gVS0", d:"A claustrophobic extreme featuring narrow spaces, difficult transitions, and sustained precision.", daysAtTop1: 0 },
    { r:23, n:"Acheron", c:"ryamu", s:922, videoId:"oh0FyZHZST8", d:"A former #1 extreme demon known for its brutal timings, demanding wave control, and punishing difficulty throughout.", daysAtTop1: 0 },
    { r:24, n:"Subterminal Point", c:"SyQual", s:920, videoId:"Syh4W449IS4", d:"A technical extreme with difficult transitions and gameplay that heavily rewards consistency.", daysAtTop1: 0 },
    { r:25, n:"Based After Based", c:"Akunakun", s:916, videoId:"_T1xofG2zqo", d:"A difficult modern extreme featuring unconventional gameplay and demanding execution.", daysAtTop1: 0 }
];

/* ========================================================
   DYNAMIC TIME FORMATTER (Days -> Weeks -> Months -> Years)
   ======================================================== */
function formatTop1Time(daysVal) {
    if (!daysVal || daysVal <= 0) return "";

    const today = new Date();
    const ageInMilliseconds = Math.max(0, today - siteReleaseDate);
    const siteAgeInDays = Math.floor(ageInMilliseconds / (1000 * 60 * 60 * 24));

    if (siteAgeInDays >= 365) {
        const years = (daysVal / 365).toFixed(1);
        return `${years} Year${years == 1.0 ? '' : 's'}`;
    } else if (siteAgeInDays >= 30) {
        const months = (daysVal / 30.4).toFixed(1);
        return `${months} Month${months == 1.0 ? '' : 's'}`;
    } else if (siteAgeInDays >= 7) {
        const weeks = (daysVal / 7).toFixed(1);
        return `${weeks} Week${weeks == 1.0 ? '' : 's'}`;
    } else {
        return `${daysVal} Day${daysVal === 1 ? '' : 's'}`;
    }
}

/* =========================
   HELPERS
   ========================= */
function getThumb(l){
    if(l.videoId){
        return `https://i.ytimg.com/vi/${l.videoId}/hqdefault.jpg`;
    }
    return "https://via.placeholder.com/320x180?text=No+Thumbnail";
}

function getVideo(l){
    if(l.videoId){
        return `https://www.youtube.com/watch?v=${l.videoId}`;
    }
    return `https://www.youtube.com/results?search_query=${encodeURIComponent(l.n)}`;
}

function getFilteredLevels(){
    const q = document.getElementById("search")?.value?.toLowerCase() || "";
    return levels.filter(l =>
        l.n.toLowerCase().includes(q) ||
        l.c.toLowerCase().includes(q)
    );
}

function updateStats(filtered){
    const statsContainer = document.getElementById("stats-container");
    if (!statsContainer) return;

    if (filtered.length === 0) {
        statsContainer.innerHTML = `<div class="stat" style="width:100%">No levels match criteria</div>`;
        return;
    }

    const count = filtered.length;
    const highest = Math.max(...filtered.map(l => l.s));
    const lowest = Math.min(...filtered.map(l => l.s));
    const avg = Math.round(filtered.reduce((a, b) => a + b.s, 0) / filtered.length);

    statsContainer.innerHTML = `
        <div class="stat">
            <span>Levels</span>
            <strong>${count}</strong>
        </div>
        <div class="stat">
            <span>Highest</span>
            <strong>${highest}</strong>
        </div>
        <div class="stat">
            <span>Lowest</span>
            <strong>${lowest}</strong>
        </div>
        <div class="stat">
            <span>Average</span>
            <strong>${avg}</strong>
        </div>
    `;
}

/* =========================
   RENDER
   ========================= */
function render(){
    const list = document.getElementById("list");
    const panel = document.getElementById("panel");
    
    list.innerHTML = "";
    let filtered = getFilteredLevels();
    
    const sortType = document.getElementById("sort")?.value;
    if (sortType === "low-score") {
        filtered.sort((a, b) => a.s - b.s);
    } else if (sortType === "site-top1") {
        filtered.sort((a, b) => (b.daysAtTop1 - a.daysAtTop1) || (a.r - b.r));
    } else if (sortType === "alphabetical") {
        filtered.sort((a, b) => a.n.localeCompare(b.n));
    } else {
        filtered.sort((a, b) => a.r - b.r);
    }

    updateStats(filtered);

    filtered.forEach(l => {
        const card = document.createElement("div");
        card.className = "card";

        const formattedTime = formatTop1Time(l.daysAtTop1);
        const historyTag = (sortType === "site-top1" && formattedTime) 
            ? `<span style="color: #ff2d2d; font-size:13px; font-weight:bold; background:rgba(255,45,45,0.15); padding:4px 9px; border-radius:6px; margin-left:4px; border: 1px solid rgba(255,45,45,0.2);">🏆 ${formattedTime} at #1</span>` 
            : '';

        card.innerHTML = `
            <img class="thumb" src="${getThumb(l)}">
            <div class="info">
                <div class="name">#${l.r} ${l.n} ${historyTag}</div>
                <div class="meta">${l.c} • Score ${l.s}</div>
            </div>
        `;

        card.onclick = () => {
            let siteHistoryText = formattedTime 
                ? `<p style="color:#ff2d2d; font-size:16px; font-weight:bold; margin: 8px 0;">Site Record: Held #1 spot for ${formattedTime}</p>` 
                : '';
            panel.innerHTML = `
                <h3>#${l.r} ${l.n}</h3>
                ${siteHistoryText}
                <div class="desc">${l.d}</div>
                <img src="${getThumb(l)}">
                <button onclick="window.open('${getVideo(l)}','_blank')">
                    ▶ Watch Video
                </button>
            `;
        };

        list.appendChild(card);
    });
}

render();
</script>

</body>
</html>
