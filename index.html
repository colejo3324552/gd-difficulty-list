<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extreme Demon Index</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

header {
    padding: 25px;
    text-align: center;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}

h1 { margin: 0; font-size: 40px; }
h2 { margin: 5px 0 0; font-weight: normal; color: #ddd; }

.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.list {
    width: 65%;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.card {
    display: flex;
    gap: 15px;
    align-items: center;
    background: #151515;
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: scale(1.01);
    border-color: rgba(255,77,77,0.4);
    background: #1d1d1d;
}

.thumb {
    width: 130px;
    height: 72px;
    border-radius: 8px;
    object-fit: cover;
    background: #222;
}

.info { flex: 1; }

.name { font-size: 18px; font-weight: bold; }
.meta { font-size: 12px; color: #aaa; margin-top: 4px; }

.panel {
    width: 35%;
    position: sticky;
    top: 20px;
    background: #121212;
    border-radius: 14px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.05);
}

.panel img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.button {
    display: block;
    margin-top: 12px;
    padding: 10px;
    text-align: center;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
<h1>Extreme Demon Index</h1>
<h2>Full 25-Level Modern Dashboard</h2>
</header>

<div class="container">

<div class="list" id="list"></div>

<div class="panel" id="panel">
<h3>Select a level</h3>
<p>Click a level to view showcase.</p>
</div>

</div>

const list = document.getElementById("list");
const panel = document.getElementById("panel");

function render(){
    list.innerHTML = "";

    levels.forEach(l=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img class="thumb" src="${l.img}">
            <div class="info">
                <div class="name">#${l.r} ${l.n}</div>
                <div class="meta">${l.c} • Score ${l.s}</div>
            </div>
        `;

        card.onclick = () => {
            panel.innerHTML = `
                <h3>#${l.r} ${l.n}</h3>
                <p>${l.d}</p>
                <img src="${l.img}">
                <a class="button" target="_blank" href="${l.video}">
                    Watch Showcase
                </a>
            `;
        };

        list.appendChild(card);
    });
}

render();

</script>

</body>
</html>
