<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extreme Demon Index</title>

<style>
/* THEME SYSTEM VARIABLES */
:root {
    --bg-gradient: linear-gradient(-45deg, #0a0a0a, #111111, #181022, #0a0a0a);
    --header-bg: linear-gradient(90deg, #ff2d2d, #7a5cff);
    --text-main: white;
    --text-sub: #aaa;
    --input-bg: #1b1b1b;
    --input-border: rgba(255,255,255,0.1);
    --stat-bg: #151515;
    --footer-bg: rgba(0,0,0,0.2);
    --footer-border: rgba(255,255,255,0.03);
}

[data-theme="light"] {
    --bg-gradient: linear-gradient(-45deg, #f5f5f7, #e5e5ea, #e1daec, #f5f5f7);
    --header-bg: linear-gradient(90deg, #ff4d4d, #917aff);
    --text-main: #1d1d1f;
    --text-sub: #555;
    --input-bg: #ffffff;
    --input-border: rgba(0,0,0,0.15);
    --stat-bg: #ffffff;
    --footer-bg: rgba(255,255,255,0.8);
    --footer-border: rgba(0,0,0,0.05);
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: var(--text-main);
    background: var(--bg-gradient);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADER */
header {
    padding: 35px 22px;
    text-align: center;
    background: var(--header-bg);
    position: relative;
    transition: background 0.3s;
}

h1 { margin: 0; font-size: 52px; color: white; }
h2 { margin: 8px 0 0; font-weight: normal; color: #ddd; font-size: 20px; }

/* THEME TOGGLE BUTTON */
.theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    width: auto;
    margin-top: 0;
    transition: background 0.2s, border-color 0.2s;
}
.theme-toggle:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.5);
}

/* UTILITY BAR */
.utility-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    padding: 25px 18px 10px 18px;
    max-width: 1400px;
    margin: 0 auto;
    width: calc(100% - 36px);
}

.search-container {
    flex: 2;
    display: flex;
    justify-content: flex-end;
}

.search-container input {
    width: 100%;
    max-width: 500px;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 18px;
    transition: background 0.3s, border 0.3s, color 0.3s;
}

.sort-container {
    flex: 1;
    display: flex;
    justify-content: flex-start;
}

.sort-container select {
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 18px;
    cursor: pointer;
    outline: none;
    transition: background 0.3s, border 0.3s, color 0.3s;
}

.changelog-toggle {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text-main);
    padding: 16px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: background 0.2s, border-color 0.2s;
}

.changelog-toggle:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.2);
}

[data-theme="light"] .changelog-toggle:hover {
    background: rgba(0,0,0,0.03);
    border-color: rgba(0,0,0,0.2);
}

/* STATS */
.stats {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 20px 18px;
}

.stat {
    background: var(--stat-bg);
    padding: 15px 22px;
    border-radius: 12px;
    text-align: center;
    min-width: 120px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: background 0.3s;
}

.stat span {
    display: block;
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 6px;
    transition: color 0.3s;
}

.stat strong {
    font-size: 24px;
}
    
/* LAYOUT */
.container {
    display: flex;
    gap: 24px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    flex: 1;
    width: calc(100% - 48px);
}

/* LIST & PANEL CONFIGURATION */
.list {
    width: 62%;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* LOCKED DARK STYLING */
.card {
    display: flex;
    gap: 18px;
    align-items: center;
    background: #151515 !important;
    color: white !important;
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: scale(1.015);
    background: #1d1d1d !important;
}

.thumb {
    width: 210px;
    height: 118px;
    border-radius: 12px;
    object-fit: cover;
    background: #222;
}

.info { flex: 1; }

.name {
    font-size: 24px;
    font-weight: bold;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.meta {
    font-size: 15px;
    color: #aaa !important;
    margin-top: 8px;
}

/* PANEL LOCKED DARK STYLING */
.panel {
    width: 38%;
    position: sticky;
    top: 24px;
    background: #121212 !important;
    color: white !important;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    height: fit-content;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
}

.panel h3 {
    font-size: 28px;
    margin-top: 5px;
    margin-bottom: 15px;
}

.panel img, iframe {
    width: 100%;
    border-radius: 12px;
    margin-top: 15px;
}

.desc {
    margin-top: 15px;
    color: #ccc !important;
    line-height: 1.6;
    font-size: 16px;
}

.panel-action-btn {
    margin-top: 18px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}

/* MODAL STYLES (CHANGELOG) */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.modal.show {
    display: flex;
    opacity: 1;
}

.modal-content {
    background: var(--input-bg);
    color: var(--text-main);
    border: 1px solid var(--input-border);
    border-radius: 16px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 30px;
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 32px;
    font-weight: bold;
    color: var(--text-sub);
    cursor: pointer;
    transition: color 0.2s;
}

.close-btn:hover {
    color: #ff2d2d;
}

.log-entry {
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--footer-border);
}

.log-entry:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
}

.log-date {
    font-size: 16px;
    color: #7a5cff;
    font-weight: bold;
    margin-bottom: 12px;
}

.log-list {
    margin: 0;
    padding-left: 20px;
    font-size: 15px;
    line-height: 1.6;
}

/* FOOTER UI */
footer {
    text-align: center;
    padding: 25px;
    font-size: 15px;
    color: var(--text-sub);
    border-top: 1px solid var(--footer-border);
    background: var(--footer-bg);
    margin-top: auto;
    transition: background 0.3s, color 0.3s, border 0.3s;
}

@keyframes popIn {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.card {
    animation: popIn 0.25s ease;
}

.card:hover {
    border-color: rgba(255, 255, 255, 0.15);
}

.card.active {
    border-color: var(--active-color, #7a5cff) !important;
    box-shadow: 0 0 16px var(--active-glow, rgba(122, 92, 255, 0.35));
    background: #1b1b1b !important;
}
</style>
</head>

<body>

<header>
    <h1>Extreme Demon Index</h1>
    <h2>The Geometry Dash Difficulty List</h2>
    <button class="theme-toggle" onclick="toggleTheme()">Switch Theme</button>
</header>

<div class="utility-bar">
    <div class="search-container">
        <input id="search" placeholder="Search levels or verifiers..." onkeyup="render()">

    </div>

</div>

<div class="stats" id="stats-container">

<script>
/* ========================================================
   CHANGELOG DATA
   ======================================================== */
const changelogData = [

/* ========================================================
   SITE CONFIG & TRACKING HISTORY

const siteReleaseDate = new Date("2026-06-08"); 

const levels = [
    { r:1, n:"Flamewall", c:"Narwall", v:"Cuatrocientos", s:983, color:"#ff4500", videoId:"gwNYGFmo_WY", d:"Long endurance extreme with nonstop transitions and tight control. Originally set to be verified by OneAlphaHelix before 2.2 physics changes, Cuatrocientos took over to verify it after 221,703 attempts.", daysAtTop1: 3 },
    { r:2, n:"Amethyst", c:"Mist", v:"wPopoff", s:980, color:"#af40ff", videoId:"OqGuNBi3_SU", d:"Precision-heavy gameplay with strict timing windows. Formally passed over from Trick, wPopoff stepped in to verify this and temporarily captured the #1 spot on the Demonlist.", daysAtTop1: 0 },
    { r:3, n:"Thinking Space II", c:"DrCuber & CairoX", v:"Zoink", s:970, color:"#4e5180", videoId:"F05aMR0F6YM", d:"Fast transitions between gameplay modes with tight space flight. Buffed heavily by Zoink to successfully claim the absolute Top 1 status on the Demonlist.", daysAtTop1: 0 },
    { r:4, n:"ORBIT", c:"MindCap", v:"Zoink", s:966, color:"#0011ff", videoId:"5NImQ8clMOs", d:"MindCap's heavily anticipated, unique all-orb Extreme Demon mega-collaboration. Officially verified by Zoink in around 30,000 attempts.", daysAtTop1: 0 },
    { r:5, n:"Tidal Wave", c:"OniLink", v:"Zoink", s:959, color:"#00f0ff", videoId:"frjtBcNI6dI", d:"The legendary mega-demon known for its vibrant beach aesthetics and sunny design that contrast brutally with its near-impossible wave sections. Relentless frame-perfect inputs and punishing click rhythms solidified its multi-year legacy at the absolute pinnacle of difficulty.", daysAtTop1: 0 },
    { r:6, n:"Boobawamba", c:"Akunakun", v:"EastShark1", s:950, color:"#33ff33", videoId:"TAPij318cjE", d:"A memory-focused extreme where learning routes and hidden interactions is just as important as execution. Rated as an extreme memory demon after being verified with 175,282 attempts.", daysAtTop1: 0 },
    { r:7, n:"Anathema", c:"nikrodox", v:"Whizkid05", s:946, color:"#7a5cff", videoId:"Vew9SOXzLME", d:"A difficult extreme built around relentless transitions and difficult timings. Under development for six years, Whizkid05 successfully verified it and shook up the Top 10 landscape.", daysAtTop1: 0 },
    { r:8, n:"Quanteuse Processing", c:"xander", v:"PersonHuman42", s:943, color:"#ff69b4", videoId:"sRUO72zI2GQ", d:"An intense precision-heavy gauntlet with demanding mechanical control and unforgiving consistency. It features complex, claustrophobic ship paths, ultra-tight wave gaps, and a series of nerve-wracking dual transitions right at the conclusion.", daysAtTop1: 0 },
    { r:9, n:"Subsuming Vortex", c:"[TCD] Cursed", v:"Cursed", s:940, color:"#115c2e", videoId:"CLzkb9YMMEg", d:"Fast-paced solo project emphasizing world-class wave mechanics and raw muscle memory. The level provides no safe harbor, forcing players through incredibly narrow spike fields and sudden speed switches that test late-level nerves.", daysAtTop1: 0 },
    { r:10, n:"Spectre", c:"xander", v:"PersonHuman42", s:939, color:"#89cff0", videoId:"T7FfTiH1G8k", d:"Technical gameplay at its finest, defined by awkward click rhythms, unconventional visual patterns, and sudden transitions. It relies heavily on strict music synchronization paired with extreme straight-fly control and rapid gravity fluctuations.", daysAtTop1: 0 },
    { r:11, n:"Penumbral", c:"Cherry Team", v:"w3rty", s:937, color:"#000000", videoId:"wcnA-6zp_94", d:"A beautifully crafted modern extreme focused on pure mechanical skill. It spaces its difficulty across dense cube timings and sweeping wave patterns, punishing any minor hesitation with an instant reset.", daysAtTop1: 0 },
    { r:12, n:"Ashley Wave Trials", c:"OddMod", v:"Zoink", s:936, color:"#ff59b3", videoId:"aTxt76U3e2Q", d:"A playful pink-and-red-themed extreme originally deemed impossible. Verified by Zoink in late 2024 after 13,677 attempts, it finally received a rate and list placement in early 2026.", daysAtTop1: 0 },
    { r:13, n:"andromeda", c:"Insxne97", v:"taiago", s:935, color:"#3b3bff", videoId:"fFtQxxepyDo", d:"An explosive, high-pressure extreme featuring relentless speed modifications. It keeps players constantly off-balance with hidden micro-timings and a chaotic, visually overwhelming wave finale that demands complete composure.", daysAtTop1: 0 },
    { r:14, n:"Menace", c:"Arraegen", v:"Trick", s:934, color:"#ff9100", videoId:"yvfq83hhwgI", d:"A grim, dark-themed test of patience and technical skill. The level drastically escalates its difficulty after a deceptively calm intro, throwing players into narrow robot precision jumps and high-speed ship corridors.", daysAtTop1: 0 },
    { r:15, n:"Silent Clubstep", c:"TheRealSailent", v:"paqoe", s:934, color:"#617385", videoId:"GR4OMkS3SN8", d:"The legendary impossible-level remake, officially conquered by paqoe. Infamous for its historic frame-perfect mini-ball jumps, near-blind memory transitions, and iconic straight-fly sections that tortured the community for a decade.", daysAtTop1: 0 },
    { r:16, n:"Kyouki", c:"Demishio", v:"Demishio", s:932, color:"#8000ff", videoId:"O_abYBtVgGU", d:"An energetic, incredibly fast solo project that demands rapid-fire click speeds. It tests a player's raw consistency across specialized wave maneuvers and high-speed ship physics, backed by a driving, aggressive soundtrack.", daysAtTop1: 0 },
    { r:17, n:"Slaughterhouse", c:"Icedcave", v:"Doggie", s:932, color:"#800000", videoId:"mVg8LgrWaYQ", d:"An infamous, atmospheric, and wave-heavy extreme demon. Long considered one of the hardest levels in the game, it was officially conquered by Doggie.", daysAtTop1: 0 },
    { r:18, n:"KOCMOC", c:"Cherry Team", v:"Zoink", s:931, color:"#5c85ff", videoId:"2CxE-UWCIG4", d:"A beautiful, space-themed cosmic extreme demon remake of Slaughterhouse, emphasizing tight corridors, blazing fast wave gameplay, and brutal precision timings.", daysAtTop1: 0 },
    { r:19, n:"Avernus", c:"PockeWindfish", v:"Zoink", s:930, color:"#ff4500", videoId:"16Zh8jssanc", d:"A notoriously brutal hell-themed level defined by its highly controversial fixed-hitbox spikes. It forces players into near-impossible wave routes and tight gaps while utilizing heavy red visual hazards to cause intentional eye strain and fatigue.", daysAtTop1: 0 },
    { r:20, n:"Nullscapes", c:"Exen", v:"Zoink", s:929, color:"#ffffff", videoId:"C-KDhWkXlvI", d:"A minimalist, monochrome void masterpiece that builds incredible tension. It strips away modern decorations to focus entirely on brutal speed corridors and raw timing, ensuring players are completely blindsided by its tight wave inputs.", daysAtTop1: 0 },

    { r:23, n:"Defeated Circles", c:"GXQ", v:"Zoink", s:923, color:"#d19eff", videoId:"W9BAW2l1e9o", d:"An advanced evolution of the classic Nine Circles formula, boasting high-density neon flashing effects. It elevates the archetype with extreme wave segments, rapid gravity shifts, and complex slant-ceiling corridors.", daysAtTop1: 0 },
    { r:24, n:"CHIL", c:"McCoco", v:"McCoco", s:921, color:"#ffb6c1", videoId:"DROMiCc2ZRM", d:"A full-solo 2.2 Extreme Demon built on incredibly fast-paced, rhythmic tap sync and complex muscle memory structures. Heavily featuring precise click sync and unforgiving transitions, it stands out with a unique aesthetic flair and punishing consistency tests throughout its layout.", daysAtTop1: 0 },
    { r:25, n:"Zorin", c:"SnowEye", v:"구아이", s:920, color:"#4a5568", videoId:"ci4lNcsSaVk", d:"An aggressive and highly technical 2.2 Extreme Demon created by SnowEye. Verified by 구아이, this gauntlet demands extreme visual coordination, dynamic timing alignments, and masterful muscle-memory transitions.", daysAtTop1: 0 },
    { r:26, n:"Acheron", c:"ryamu", v:"Zoink", s:919, color:"#ff0000", videoId:"oh0FyZHZST8", d:"A former absolute king of the difficulty list, representing the pinnacle of old-school elite decoration paired with frame-perfect mechanics. Its grim industrial style perfectly echoes the punishing inputs required at every single jump.", daysAtTop1: 0 },
    { r:27, n:"Tunnel of Despair", c:"Exen", v:"Zoink", s:918, color:"#525252", videoId:"0GC5og7gVS0", d:"A claustrophobic, dark labyrinth engineered around tight micro-adjustments. The map physically limits player movement options, demanding precise, feather-light taps to navigate tight tunnels in ship and wave modes.", daysAtTop1: 0 },
    { r:28, n:"Subterminal Point", c:"SyQual", v:"PoCle", s:916, color:"#7fffd4", videoId:"Syh4W449IS4", d:"A deeply technical level relying on irregular gameplay sync and custom layouts. It heavily rewards rhythmic consistency, forcing players to study exact click audio patterns to survive its complex mechanical structures.", daysAtTop1: 0 },
    { r:29, n:"The Lightning Rod", c:"lavatrex", v:"lavatrex", s:915, color:"#008080", videoId:"DCbXHYwW7r0", d:"A high-voltage, fast-paced extreme demon engineered around lightning-fast sync and overwhelming mechanical speed. It tests players with brutal click consistency, rapid gravity shifts, and tight wave corridors wrapped in an electrifying teal storm aesthetic.", daysAtTop1: 0 },
    { r:30, n:"Based After Based", c:"Akunakun", v:"DiamondSplash", s:912, color:"#ddff00", videoId:"_T1xofG2zqo", d:"An ironic yet brutally demanding extreme that parodies early game layout structures. Despite its simple aesthetic style, it hides extreme frame-perfect timings and highly erratic click setups that push traditional muscle memory to its breaking point.", daysAtTop1: 0 }
];

/* ========================================================
   MODAL LOGIC
   ======================================================== */
function toggleChangelog() {
    const modal = document.getElementById("changelog-modal");
    if (modal.classList.contains("show")) {
        modal.classList.remove("show");
        setTimeout(() => modal.style.display = "none", 300);
    } else {
        modal.style.display = "flex";
        void modal.offsetWidth; 
        modal.classList.add("show");
        renderChangelog();
    }
}

function renderChangelog() {
    const listContainer = document.getElementById("changelog-list");
    listContainer.innerHTML = changelogData.map(log => `
        <div class="log-entry">
            <div class="log-date">${log.date}</div>
            <ul class="log-list">
                ${log.changes.map(c => `<li>${c}</li>`).join('')}
            </ul>
        </div>
    `).join('');
}

window.onclick = function(event) {
    const modal = document.getElementById("changelog-modal");
    if (event.target == modal) {
        toggleChangelog();
    }
}

/* ========================================================
   LIGHT / DARK THEME TOGGLE LOGIC
   ======================================================== */
function toggleTheme() {
    const currentTheme = document.body.getAttribute("data-theme");
    if (currentTheme === "light") {
        document.body.removeAttribute("data-theme");
    } else {
        document.body.setAttribute("data-theme", "light");
    }
}

/* ========================================================
   DYNAMIC TIME FORMATTER
   ======================================================== */
function formatTop1Time(daysVal) {
    if (!daysVal || daysVal <= 0) return "";

    const today = new Date();
    const ageInMilliseconds = Math.max(0, today - siteReleaseDate);
    const siteAgeInDays = Math.floor(ageInMilliseconds / (1000 * 60 * 60 * 24));

    if (siteAgeInDays >= 365) {
        const years = (daysVal / 365).toFixed(1);
        return `${years} Year${years == 1.0 ? '' : 's'}`;
    } else if (siteAgeInDays >= 30) {
        const months = (daysVal / 30.4).toFixed(1);
        return `${months} Month${months == 1.0 ? '' : 's'}`;
    } else if (siteAgeInDays >= 7) {
        const weeks = (daysVal / 7).toFixed(1);
        return `${weeks} Week${weeks == 1.0 ? '' : 's'}`;
    } else {
        return `${daysVal} Day${daysVal === 1 ? '' : 's'}`;
    }
}

/* =========================
   HELPERS
   ========================= */
function getThumb(l){
    if(l.videoId){
        return `https://i.ytimg.com/vi/${l.videoId}/hqdefault.jpg`;
    }
    return "https://via.placeholder.com/320x180?text=No+Thumbnail";
}

function getVideo(l){
    if(l.videoId){
        return `https://www.youtube.com/watch?v=${l.videoId}`;
    }
    return `https://www.youtube.com/results?search_query=${encodeURIComponent(l.n)}`;
}

function getFilteredLevels(){
    const q = document.getElementById("search")?.value?.toLowerCase() || "";
    return levels.filter(l =>
        l.n.toLowerCase().includes(q) ||
        l.c.toLowerCase().includes(q) ||
        l.v.toLowerCase().includes(q)
    );
}

function updateStats(filtered){
    const statsContainer = document.getElementById("stats-container");
    if (!statsContainer) return;

    if (filtered.length === 0) {
        statsContainer.innerHTML = `<div class="stat" style="width:100%; color: var(--text-main)">No levels match criteria</div>`;
        return;
    }

    const count = filtered.length;
    const highest = Math.max(...filtered.map(l => l.s));
    const lowest = Math.min(...filtered.map(l => l.s));
    const avg = Math.round(filtered.reduce((a, b) => a + b.s, 0) / filtered.length);

    statsContainer.innerHTML = `
        <div class="stat">
            <span>Levels</span>
            <strong>${count}</strong>
        </div>
        <div class="stat">
            <span>Highest</span>
            <strong>${highest}</strong>
        </div>
        <div class="stat">
            <span>Lowest</span>
            <strong>${lowest}</strong>
        </div>
        <div class="stat">
            <span>Average</span>
            <strong>${avg}</strong>
        </div>
    `;
}

/* =========================
   RENDER
   ========================= */
function render(){
    const list = document.getElementById("list");
    const panel = document.getElementById("panel");
    
    list.innerHTML = "";
    let filtered = getFilteredLevels();
    
    const sortType = document.getElementById("sort")?.value;
    if (sortType === "low-score") {
        filtered.sort((a, b) => a.s - b.s);
    } else if (sortType === "site-top1") {
        filtered.sort((a, b) => (b.daysAtTop1 - a.daysAtTop1) || (a.r - b.r));
    } else if (sortType === "alphabetical") {
        filtered.sort((a, b) => a.n.localeCompare(b.n));
    } else {
        filtered.sort((a, b) => a.r - b.r);
    }

    updateStats(filtered);

    filtered.forEach(l => {
        const card = document.createElement("div");
        card.className = "card";

        const formattedTime = formatTop1Time(l.daysAtTop1);
        const historyTag = (sortType === "site-top1" && formattedTime) 
            ? `<span style="color: #ff2d2d; font-size:13px; font-weight:bold; background:rgba(255,45,45,0.15); padding:4px 9px; border-radius:6px; margin-left:4px; border: 1px solid rgba(255,45,45,0.2);">🏆 ${formattedTime} at #1</span>` 
            : '';

        card.innerHTML = `
            <img class="thumb" src="${getThumb(l)}">
            <div class="info">
                <div class="name">#${l.r} ${l.n} ${historyTag}</div>
                <div class="meta">${l.c} • <span style="color:#7a5cff; font-weight:bold;">Verified by ${l.v}</span> • Score ${l.s}</div>
            </div>
        `;

        card.onclick = () => {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('active');
                c.style.removeProperty('--active-color');
                c.style.removeProperty('--active-glow');
            });
            
            card.classList.add('active');
            card.style.setProperty('--active-color', l.color);
            card.style.setProperty('--active-glow', `${l.color}4c`); 

            let siteHistoryText = formattedTime 
                ? `<p style="color:#ff2d2d; font-size:16px; font-weight:bold; margin: 8px 0;">Site Record: Held #1 spot for ${formattedTime}</p>` 
                : '';

            panel.innerHTML = `
                <h3>#${l.r} ${l.n}</h3>
                <p style="margin: -10px 0 10px 0; font-size: 16px; color: #aaa;">Created by ${l.c} • Verified by <strong>${l.v}</strong></p>
                ${siteHistoryText}
                <div class="desc">${l.d}</div>
                <img src="${getThumb(l)}">

                <button class="panel-action-btn" style="background: linear-gradient(90deg, ${l.color}, #151515); border-radius: 8px;" onclick="window.open('${getVideo(l)}','_blank')">
                    Watch Verification Video
                </button>
            `;
        };

        list.appendChild(card);
    });
}

render();
</script>
