<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Extreme Demon Index</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #050505 70%);
    color: white;
    overflow-x: hidden;
}

/* 🌌 animated background glow */
body::before {
    content: "";
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,77,77,0.08), transparent 40%),
                radial-gradient(circle, rgba(120,80,255,0.06), transparent 45%),
                radial-gradient(circle, rgba(0,200,255,0.05), transparent 50%);
    animation: drift 18s infinite linear;
    z-index: -1;
}

@keyframes drift {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

header {
    text-align: center;
    padding: 30px 20px 10px;
}

h1 {
    font-size: 56px;
    margin: 0;
    background: linear-gradient(90deg, #ff4d4d, #ffb84d, #7a5cff, #ff4d4d);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 6s infinite linear;
    text-shadow: 0 0 25px rgba(255,77,77,0.2);
}

@keyframes shimmer {
    0% { background-position: 0% }
    100% { background-position: 300% }
}

h2 {
    color: #aaa;
    font-weight: normal;
}

#search {
    margin: 20px auto;
    display: block;
    padding: 12px 16px;
    width: 60%;
    max-width: 500px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(30,30,30,0.7);
    color: white;
    backdrop-filter: blur(10px);
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px 40px 40px;
    max-width: 1400px;
    margin: auto;
}

/* 🧊 glass table */
table {
    width: 70%;
    border-collapse: collapse;
    background: rgba(25,25,25,0.6);
    border-radius: 14px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

th {
    background: linear-gradient(90deg, #ff4d4d, #ff7a7a);
    padding: 14px;
}

td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: all 0.2s ease;
}

/* ⚡ hover glow rows */
tr:hover td {
    background: rgba(255,77,77,0.08);
    transform: scale(1.01);
}

/* rank color scaling */
.rank {
    width: 70px;
    text-align: center;
    font-weight: bold;
    color: #ffb84d;
}

/* 🌈 creator + score styling */
.creator { color: #bdbdbd; }
.score { color: #ffe37a; text-align: center; font-weight: bold; }

/* 🧠 sidebar glow panel */
.sidebar {
    width: 30%;
    background: rgba(20,20,20,0.6);
    border-radius: 14px;
    padding: 20px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 30px rgba(255,77,77,0.15);
    position: sticky;
    top: 20px;
    height: fit-content;
    animation: floatIn 0.4s ease;
}

@keyframes floatIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.sidebar h3 {
    margin-top: 0;
    color: #ff4d4d;
}

.tag {
    display: inline-block;
    padding: 5px 9px;
    margin-top: 6px;
    margin-right: 5px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-size: 12px;
    color: #ccc;
}

footer {
    text-align: center;
    color: #666;
    padding: 30px;
}
</style>
</head>

<body>

<header>
    <h1>The Extreme Demon Index</h1>
    <h2>Top 25 Hardest Geometry Dash Levels</h2>
</header>

<input id="search" placeholder="Search levels..." oninput="filterTable()">

<div class="container">

<table id="table">
<thead>
<tr>
    <th>Rank</th>
    <th>Level</th>
    <th>Creator</th>
    <th>Score</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="sidebar" id="sidebar">
    <h3>Hover a level</h3>
    <p>Move your cursor over a level to see breakdowns.</p>
</div>

</div>

<footer>
    The Extreme Demon Index • Neon Difficulty Archive
</footer>

<script>

const levels = [
{r:1,n:"Flamewall",c:"Narwall",s:983,d:"Endless-feeling level with constant transitions and tight control. It’s less about skill spikes and more about surviving the entire run without breaking focus."},

{r:2,n:"Amethyst",c:"iMist",s:980,d:"Precision-heavy gameplay where everything depends on tight syncing and clean execution. Very easy to fall apart if your rhythm slips."},

{r:3,n:"ORBIT",c:"MindCap",s:967,d:"Orb chains and timing sequences that punish even slight mistiming. Feels smooth until it suddenly isn’t."},

{r:4,n:"Thinking Space II",c:"CairoX",s:962,d:"Rapid shifts between modes and speeds. You’re constantly adjusting instead of getting comfortable."},

{r:5,n:"Tidal Wave",c:"OniLink",s:959,d:"Fast wave control stretched over long, punishing sections. Consistency is everything here."},

{r:6,n:"Boobawamba",c:"Akunakun",s:950,d:"Memory-heavy gameplay where you’re constantly tracking what comes next. If you forget a sequence, the run collapses instantly."},

{r:7,n:"Anathema",c:"nikroplays",s:946,d:"Unstable pacing with constant gameplay changes. It never lets you settle into a rhythm."},

{r:8,n:"Silent Clubstep",c:"TheRealSailent",s:934,d:"Extreme remake with brutally tight timings and unforgiving ship/wave sections."},

{r:9,n:"Acheron",c:"ryamu",s:922,d:"High-speed wave sections with almost no room for correction. Pure consistency test."},

{r:10,n:"Avernus",c:"PockeWindfish",s:932,d:"Wave-heavy gameplay with uneven spikes in difficulty that keep you on edge."},

{r:11,n:"Spectre",c:"xander",s:940,d:"Looks smooth, plays strict. Timing windows are tighter than they appear."},

{r:12,n:"Nullscapes",c:"Exen",s:931,d:"Minimal visuals hiding awkward timing and deceptive flow."},

{r:13,n:"Abyss of Darkness",c:"Kiba",s:927,d:"Dark, tight wave control with long stretches of sustained pressure."},

{r:14,n:"Kyouki",c:"｛出見塩｝",s:932,d:"Fast wave sequences demanding long consistency without mistakes."},

{r:15,n:"Ashley Wave Trials",c:"oddmod",s:936,d:"Endurance-focused wave challenge with long consistent sections."},

{r:16,n:"Every End",c:"MindCap",s:929,d:"Long, draining level where mental fatigue becomes part of the difficulty."},

{r:17,n:"Defeated Circles",c:"GXQ",s:925,d:"Rhythmic circular movement patterns that feel simple until timing tightens."},

{r:18,n:"Tunnel of Despair",c:"Exen",s:922,d:"Claustrophobic wave paths with almost no reaction space."},

{r:19,n:"Subterminal Point",c:"SyQual",s:920,d:"Sudden difficulty spikes that punish inconsistency."},

{r:20,n:"Menace",c:"Arraegen",s:934,d:"Fast bursts of tight inputs with little forgiveness."},

{r:21,n:"andromeda",c:"Insxne97",s:935,d:"Constant speed and style shifts keep you guessing."},

{r:22,n:"Penumbral",c:"cherryteam",s:937,d:"Dark visuals that subtly hide strict gameplay timing."},

{r:23,n:"Quanteuse Processing",c:"Renn241",s:940,d:"Offbeat rhythm structures that throw off natural timing."},

{r:24,n:"Based After Based",c:"Akunakun",s:916,d:"Looks chaotic and meme-like, but execution is surprisingly strict."}
];

const tbody = document.querySelector("#table tbody");
const sidebar = document.getElementById("sidebar");

function renderTable(data){
    tbody.innerHTML = "";

    data.forEach(l=>{
        const row = document.createElement("tr");

        row.innerHTML = `
            <td class="rank">#${l.r}</td>
            <td>${l.n}</td>
            <td class="creator">${l.c}</td>
            <td class="score">${l.s}</td>
        `;

        row.onmouseenter = () => {
            sidebar.innerHTML = `
                <h3>#${l.r} ${l.n}</h3>
                <span class="tag">${l.c}</span>
                <span class="tag">${l.s}</span>
                <p style="margin-top:15px; color:#ccc; line-height:1.5;">
                    ${l.d}
                </p>
            `;
        };

        tbody.appendChild(row);
    });
}

function filterTable(){
    const q = document.getElementById("search").value.toLowerCase();
    const filtered = levels.filter(l =>
        l.n.toLowerCase().includes(q) ||
        l.c.toLowerCase().includes(q)
    );
    renderTable(filtered);
}

renderTable(levels);

</script>

</body>
</html>
