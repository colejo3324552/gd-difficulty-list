<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extreme Demon Index</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* HEADER */
header {
    padding: 22px;
    text-align: center;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}

h1 { margin: 0; font-size: 40px; }
h2 { margin: 5px 0 0; font-weight: normal; color: #ddd; }

/* LAYOUT */
.container {
    display: flex;
    gap: 18px;
    padding: 18px;
}

/* LIST */
.list {
    width: 60%;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* CARD */
.card {
    display: flex;
    gap: 12px;
    align-items: center;
    background: #151515;
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: scale(1.01);
    background: #1d1d1d;
    border-color: rgba(255,77,77,0.4);
}

.thumb {
    width: 140px;
    height: 78px;
    border-radius: 10px;
    object-fit: cover;
    background: #222;
}

.info { flex: 1; }

.name {
    font-size: 18px;
    font-weight: bold;
}

.meta {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
}

/* PANEL */
.panel {
    width: 40%;
    position: sticky;
    top: 18px;
    background: #121212;
    border-radius: 14px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.05);
}

.panel img, iframe {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.desc {
    margin-top: 10px;
    color: #ccc;
    line-height: 1.4;
}

button {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}
</style>
</head>

/* =========================
   HELPERS (NO MORE MISMATCH)
   ========================= */

function getThumb(l){
    if(l.videoId){
        return `https://i.ytimg.com/vi/${l.videoId}/hqdefault.jpg`;
    }
    return "https://via.placeholder.com/320x180?text=No+Thumbnail";
}

function getVideo(l){
    if(l.videoId){
        return `https://www.youtube.com/watch?v=${l.videoId}`;
    }
    return `https://www.youtube.com/results?search_query=${encodeURIComponent(l.videoSearch)}`;
}

/* =========================
   RENDER
   ========================= */

const list = document.getElementById("list");
const panel = document.getElementById("panel");

function render(){
    list.innerHTML = "";

    levels.forEach(l=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img class="thumb" src="${getThumb(l)}">
            <div class="info">
                <div class="name">#${l.r} ${l.n}</div>
                <div class="meta">${l.c} • Score ${l.s}</div>
            </div>
        `;

        card.onclick = () => {
            panel.innerHTML = `
                <h3>#${l.r} ${l.n}</h3>

                <div class="desc">${l.d}</div>

                ${
                    l.videoId
                    ? `<img src="${getThumb(l)}">`
                    : `<iframe height="200" src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(l.videoSearch)}" frameborder="0"></iframe>`
                }

                <button onclick="window.open('${getVideo(l)}','_blank')">
                    Watch Showcase
                </button>
            `;
        };

        list.appendChild(card);
    });
}

render();
