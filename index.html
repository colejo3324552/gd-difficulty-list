<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extreme Demon Index</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background: linear-gradient(-45deg, #0a0a0a, #111111, #181022, #0a0a0a);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADER */
header {
    padding: 22px;
    text-align: center;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}

h1 { margin: 0; font-size: 40px; }
h2 { margin: 5px 0 0; font-weight: normal; color: #ddd; }

/* LAYOUT */
.container {
    display: flex;
    gap: 18px;
    padding: 18px;
}

/* LIST */
.list {
    width: 60%;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

    .search-container {
    display: flex;
    justify-content: center;
    padding: 10px 18px;
}

.search-container input {
    width: 60%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #1b1b1b;
    color: white;
}

.stats {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 10px 18px;
}

.stat {
    background: #151515;
    padding: 10px 14px;
    border-radius: 10px;
}
    
/* CARD */
.card {
    display: flex;
    gap: 12px;
    align-items: center;
    background: #151515;
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
    transform: scale(1.01);
    background: #1d1d1d;
    border-color: rgba(255,77,77,0.4);
}

.thumb {
    width: 140px;
    height: 78px;
    border-radius: 10px;
    object-fit: cover;
    background: #222;
}

.info { flex: 1; }

.name {
    font-size: 18px;
    font-weight: bold;
}

.meta {
    font-size: 12px;
    color: #aaa;
    margin-top: 4px;
}

/* PANEL */
.panel {
    width: 40%;
    position: sticky;
    top: 18px;
    background: #121212;
    border-radius: 14px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.05);
}

.panel img, iframe {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.desc {
    margin-top: 10px;
    color: #ccc;
    line-height: 1.4;
}

button {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg, #ff2d2d, #7a5cff);
}
</style>
</head>

<body>

/* =========================
   HELPERS (NO MORE MISMATCH)
   ========================= */

function getThumb(l){
    if(l.videoId){
        return `https://i.ytimg.com/vi/${l.videoId}/hqdefault.jpg`;
    }
    return "https://via.placeholder.com/320x180?text=No+Thumbnail";
}

function getVideo(l){
    if(l.videoId){
        return `https://www.youtube.com/watch?v=${l.videoId}`;
    }
    return `https://www.youtube.com/results?search_query=${encodeURIComponent(l.videoSearch)}`;
}

/* =========================
   RENDER
   ========================= */

const list = document.getElementById("list");
const panel = document.getElementById("panel");
function getFilteredLevels(){
    const q = document.getElementById("search")?.value?.toLowerCase() || "";
    return levels.filter(l =>
        l.n.toLowerCase().includes(q) ||
        l.c.toLowerCase().includes(q)
    );
}
function render(){
    list.innerHTML = "";

    getFilteredLevels().forEach(l=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img class="thumb" src="${getThumb(l)}">
            <div class="info">
                <div class="name">#${l.r} ${l.n}</div>
                <div class="meta">${l.c} • Score ${l.s}</div>
            </div>
        `;

        card.onclick = () => {
            panel.innerHTML = `
                <h3>#${l.r} ${l.n}</h3>

                <div class="desc">${l.d}</div>

                ${
                    l.videoId
                    ? `<img src="${getThumb(l)}">`
                    : `<iframe height="200" src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(l.videoSearch)}" frameborder="0"></iframe>`
                }

                <button onclick="window.open('${getVideo(l)}','_blank')">
                    ▶ Watch Video
                </button>
            `;
        };

        list.appendChild(card);
    });
}

render();
